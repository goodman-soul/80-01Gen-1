version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sample-system-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sample_user
      POSTGRES_PASSWORD: sample_password
      POSTGRES_DB: sample_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sample_user"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
